name: Generate Template Catalog

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate catalog
        run: bun run scripts/generate-template-catalog.ts

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "railway-bot"
          git config user.email "bot@railway.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="catalog-update-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git commit -m "Update template catalog $(date -u +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --title "Update template catalog $(date -u +%Y-%m-%d)" --body "Automated daily sync." --base main)
          gh pr merge "$PR_URL" --squash --auto

  notify-failure:
    runs-on: ubuntu-latest
    needs: generate
    if: failure()
    steps:
      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Template catalog generation failed"
          body: |
            The daily template catalog generation workflow failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
